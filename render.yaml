# Render deployment configuration
# Deploy: https://dashboard.render.com → New Web Service → Connect GitHub repo

services:
  - type: web
    name: teja-labs
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --config gunicorn.conf.py
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: teja-labs-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false  # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false  # Set to your domain(s)

databases:
  - name: teja-labs-db
    databaseName: teja_agency
    user: teja
    plan: free
