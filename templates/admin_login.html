<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login — Sai Creations</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Inter', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-10">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl shadow-lg mb-4">
      <span class="font-black text-xl text-gray-900">TL</span>
    </div>
    <h1 class="text-white font-bold text-2xl">Sai Creations Admin</h1>
    <p class="text-gray-500 text-sm mt-1">Lead management dashboard</p>
  </div>

  <!-- Card -->
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl">
    {% if error %}
    <div class="bg-red-950 border border-red-800 text-red-300 rounded-xl px-4 py-3 mb-6 text-sm flex items-center gap-2">
      <span class="material-symbols-outlined text-red-400 text-lg">error</span>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin">
      <div class="mb-6">
        <label class="block text-gray-400 text-sm font-medium mb-2" for="password">Admin Password</label>
        <input id="password" name="password" type="password" required autofocus
          placeholder="Enter password"
          class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all
                 placeholder-gray-600"/>
      </div>
      <button type="submit"
        class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl
               transition-all hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-lg">lock_open</span>
        Access Dashboard
      </button>
    </form>

    <p class="text-center text-gray-600 text-xs mt-6">
      Default password: <code class="text-gray-500 bg-gray-800 px-1 rounded">admin123</code><br/>
      Change via <code class="text-gray-500 bg-gray-800 px-1 rounded">ADMIN_PASSWORD</code> in .env
    </p>
  </div>

  <p class="text-center text-gray-700 text-xs mt-6">
    <a href="/" class="hover:text-gray-500 transition-colors">← Back to website</a>
  </p>
</div>

</body>
</html>
